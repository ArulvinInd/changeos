<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ChangeOS</title>
    <script>
      // GitHub Pages SPA fix — redirect 404s back to index.html, preserving the path.
      // Technique: encode the path into the URL's query string so GH Pages serves index.html,
      // then index.html decodes it and replaces history state.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
